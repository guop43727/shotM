    - "修复全部 7 个 blocking 级别问题（FND-SPEC-001 ~ FND-SPEC-007），确保 HTML 元素 ID、CSS class 命名、EventBus 事件、错误码与 L2 规范完全一致"
    - "更新 index.html 中的 modal 元素 ID 和容器 ID，与 weaponUI.js 的修改保持同步"
    - "更新 style.css 中的 CSS 类名，采用 BEM 命名规范"
  
  next_round_focus:
    - "修复 6 个 warning 级别问题（FND-SPEC-008 ~ FND-SPEC-013），提升代码与 L2 设计模式的一致性"
    - "考虑实现 2 个 info 级别建议（FND-SPEC-014 ~ FND-SPEC-015），提升数据完整性和迁移健壮性"
  
