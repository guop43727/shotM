    expected: "只设置 id, tier, damage, fireRate, bulletCount, color 字段"
    actual: "额外设置了 player.weapon.type = config.id"
    root_cause: case_a_impl_bug
    remediation: "移除 weaponManager.js:180 中的 'player.weapon.type = config.id' 赋值语句，只保留 L2 规范定义的 6 个字段"
    evidence:
      - "api-design.md Unit-004 STEP-02 定义: 设置 player.weapon 的 6 个字段 (id, tier, damage, fireRate, bulletCount, color)"
      - "weaponManager.js:180 实际代码: player.weapon.type = config.id (未在规范中定义)"

