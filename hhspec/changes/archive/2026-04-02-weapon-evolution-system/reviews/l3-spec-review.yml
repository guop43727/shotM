  - id: FND-SPEC-009
    level: warning
    category: l2_design_patterns
    check_item: SPEC-08
    spec_ref: "hhspec/changes/weapon-evolution-system/specs/design/api-design.md Unit-003"
    impl_ref: "weaponManager.js:120-140"
    description: "mergeWeapons() 验证步骤顺序与 L2 API 设计不一致"
    expected: "STEP-02 检查材料数量 (count < 3)，STEP-03 检查最大等级 (!config.nextTier)"
    actual: "先检查最大等级 (!config.nextTier)，再检查材料数量 (count < 3)"
    root_cause: case_a_impl_bug
    remediation: "调整 weaponManager.js 中 mergeWeapons() 的验证顺序，先检查材料数量，再检查最大等级，与 L2 API 设计的 Part 1 步骤顺序保持一致"
    evidence:
      - "api-design.md Unit-003 Part 1 定义: STEP-02 检查材料数量，STEP-03 检查最大等级"
      - "weaponManager.js:125-135 实际顺序: 先 if (!config.nextTier)，再 if (count < 3)"

