      - "weaponUI.js:150-160 实际使用: stateClasses.push('owned'), stateClasses.push('locked') 等"

  - id: FND-SPEC-006
    level: blocking
    category: code_patterns
    check_item: SPEC-01
    spec_ref: "hhspec/changes/weapon-evolution-system/specs/design/api-design.md Unit-001, Unit-003, Unit-004, Unit-009, Unit-010"
    impl_ref: "weaponManager.js:50, 120, 180; weaponUI.js:30, 40"
    description: "缺少 EventBus 事件发射，违反 L2 API 设计的事件契约"
    expected: "addWeapon() 发射 'weapon:collected'; mergeWeapons() 发射 'weapon:synthesized'; equipWeapon() 发射 'weapon:equipped'; openWeaponModal() 发射 'weapon:modal:open'; closeWeaponModal() 发射 'weapon:modal:close'"
    actual: "所有方法均未调用 EventBus.emit()"
    root_cause: case_a_impl_bug
    remediation: "在 weaponManager.js 的 addWeapon()、mergeWeapons()、equipWeapon() 方法中添加对应的 EventBus.emit() 调用；在 weaponUI.js 的 openWeaponModal()、closeWeaponModal() 方法中添加对应的 EventBus.emit() 调用"
    evidence:
      - "api-design.md Unit-001 定义: addWeapon() STEP-04 发射 'weapon:collected' 事件"
      - "api-design.md Unit-003 定义: mergeWeapons() STEP-08 发射 'weapon:synthesized' 事件"
      - "api-design.md Unit-004 定义: equipWeapon() STEP-04 发射 'weapon:equipped' 事件"
      - "api-design.md Unit-009 定义: openWeaponModal() STEP-03 发射 'weapon:modal:open' 事件"
      - "api-design.md Unit-010 定义: closeWeaponModal() STEP-02 发射 'weapon:modal:close' 事件"
      - "weaponManager.js 和 weaponUI.js 中未找到任何 EventBus.emit() 调用"

  - id: FND-SPEC-007
    level: blocking
    category: error_strategy
    check_item: SPEC-02
    spec_ref: "hhspec/changes/weapon-evolution-system/specs/design/error-design.md Unit-001 V-003"
    impl_ref: "weaponManager.js:45"
    description: "addWeapon() 对未知武器类型使用错误的错误码"
    expected: "V-003 (unknown weaponType) 映射到 DATA-004"
    actual: "console.error('[BIZ-002] Unknown weapon type:', weaponType)"
    root_cause: case_a_impl_bug
    remediation: "将 weaponManager.js:45 的错误码从 'BIZ-002' 改为 'DATA-004'，并返回错误对象 {success: false, error: 'DATA-004', message: '未知武器类型'}"
    evidence:
      - "error-design.md Unit-001 V-003 定义: 未知 weaponType → DATA-004"
      - "weaponManager.js:45 实际使用: console.error('[BIZ-002] Unknown weapon type:', weaponType)"

