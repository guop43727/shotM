      若调用方代码为 if (weaponManager.addWeapon(type)) { ... }，则此检查始终失败；
      但若调用方不做返回值检查则静默失败。"
    remediation: >
      方案 A（抛出错误，让调用方决定处理）：
        throw new Error('[BIZ-002] Unknown weapon type: ' + weaponType);
      方案 B（返回结果对象，与 mergeWeapons 风格一致）：
        return { success: false, error: 'BIZ-002', message: '未知武器类型: ' + weaponType };
      同时在成功路径 return { success: true }。

