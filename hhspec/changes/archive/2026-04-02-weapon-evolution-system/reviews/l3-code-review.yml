      lines_1: "213-235"
      file_2: weaponManager.js
      lines_2: "337-361"
      note: "两处 try-catch 结构、snapshot 变量名和回滚逻辑一字不差"
    recommendation: >
      提取通用事务执行器：
        _runTransaction(operation) {
          const snapshot = { ...this.inventory };
          try {
            const result = operation();
            const saveResult = this.saveInventory();
            if (!saveResult) throw new Error('Save failed');
            return result;
          } catch (error) {
            this.inventory = snapshot;
            console.error('[TXN-004] Transaction failed, rolled back:', error);
            return { success: false, error: 'TXN-004', message: '操作失败，已回滚' };
          }
        }

