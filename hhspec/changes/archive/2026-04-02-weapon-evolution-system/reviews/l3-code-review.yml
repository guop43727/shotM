# 不确定性声明
uncertainties:
  - id: UNC-001
    description: >
      equipWeapon() 中通过全局 player 对象（typeof player !== 'undefined'）修改武器属性，
      这种全局依赖在测试环境下需要注入 player 对象。在浏览器运行时行为无法静态确认，
      若 player.weapon 为 undefined 而非 null，则 player.weapon.id 会抛出 TypeError。
      已标注为 warning 级别风险点而非 blocking，因为 player.weapon 对象存在性依赖于游戏初始化顺序，
      无法从代码中确认其始终存在。
    file: weaponManager.js
    lines: "253-260"

  - id: UNC-002
    description: >
      canMerge() 中 player 装备检查（line 280）与 mergeWeapons() 中相同检查（line 208）逻辑一致，
      但两者均直接访问全局 player 对象。如果 player 对象的 weapon.id 字段命名与
      weaponEvolutionConfig 的 id 字段不一致（例如 player.weapon.type vs player.weapon.id），
      则两处检查结果可能不同。无法仅从 weaponManager.js 静态确认 player.weapon 的具体结构。
    file: weaponManager.js
    lines: "208, 280"
