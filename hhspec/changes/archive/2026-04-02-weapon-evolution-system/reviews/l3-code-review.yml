  - id: FND-CODE-010
    category: boundary_condition
    check_item: CODE-02
    severity: warning
    title: "mousemove 坐标计算中 panOffset 修正方向错误（panOffset 未参与正确计算）"
    description: >
      weaponUI.js _attachTreeInteractionListeners()（lines 588-631）中鼠标坐标转换（lines 596-597）：
        const mouseX = (e.clientX - rect.left) / this.evolutionTreeState.zoomLevel
                        - this.evolutionTreeState.panOffset.x;
        const mouseY = (e.clientY - rect.top) / this.evolutionTreeState.zoomLevel
                        - this.evolutionTreeState.panOffset.y;
      但 _renderEvolutionTreeCanvas()（lines 404-405）中应用变换的顺序是：
        ctx.translate(panOffset.x, panOffset.y);  // 先平移
        ctx.scale(zoomLevel, zoomLevel);           // 后缩放
      在 Canvas 2D 中，translate + scale 的世界坐标与屏幕坐标的逆变换应为：
        worldX = (screenX / zoom) - panX
      但由于 translate 在 scale 之前，正确的逆变换为：
        worldX = screenX / zoom - panX
      当前减法写法在 translate 发生在 scale 之前时实际是正确的（先除以 zoom 后减 pan），
      但若平移量很大时命中检测会出现偏移。需确认坐标系一致性。
      注意：在 _rerenderTree()（line 581-585）中 panOffset 始终为 { x: 0, y: 0 }（无平移交互），
      因此当前版本此问题不会显现，但为可维护性标记为 warning。
    evidence:
      file: weaponUI.js
      lines: "596-597"
      note: "canvas click handler（lines 623-624）存在相同的坐���计算，需同步检查"
    recommendation: >
      添加注释说明坐标变换的��学依据，并验证 pan 功能激活时的命中检测正确性。
      如果 pan 功能未实现，可以简化坐标计算并添加 TODO 注释。

