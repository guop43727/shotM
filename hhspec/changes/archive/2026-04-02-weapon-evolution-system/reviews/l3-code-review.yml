      然后事务代码通过 inv.super_rifle -= 1（lines 341-346）直接操作——这与 mergeWeapons()
      通过 this.inventory[weaponType] -= 3 直接操作一致，但不一致的是两者混用了
      this.inventory 和 inv 引用。
      更关键的是：回滚时 this.inventory = snapshot 会恢复 this.inventory 指向，
      但 inv 仍指向旧的已修改对象，若其后代码还使用 inv 则会读到脏数据。
      在当前代码路径中 inv 在 catch 之后不再被使用，但此模式极易在后续维护时引入
      "回滚后继续读取 inv"的 bug。
    evidence:
      file: weaponManager.js
      lines: "329-361"
      code_snippet: |
        fuseUltimateWeapon() {
          const inv = this.inventory;      // inv 指向 this.inventory
          ...
          const snapshot = { ...this.inventory };  // 快照
          try {
            inv.super_rifle -= 1;          // 通过 inv 修改
            ...
            this.inventory = snapshot;     // 回滚：this.inventory 重新指向 snapshot
