  - id: FND-CODE-002
    category: immutability_violation
    check_item: CODE-01
    severity: blocking
    root_cause: case_a_impl_bug
    title: "StorageAdapter.validateInventory() 直接修改传入对象，违反不可变性原则"
    description: >
      weaponManager.js StorageAdapter.validateInventory()（lines 118-137）在
      验证 inventory 合法性时，对传入对象 inventory 直接赋值（lines 124-133），
      包括：inventory.rifle = 1（line 125）以及 inventory[weaponId] = Math.max(...)（line 132）。
      这意味着调用方传入的对象在校验后会被静默修改，调用方无法感知数据被改变，
      引发隐藏的副作用。触发条件：任何以 getDefaultInventory() 之外的途径调用
      validateInventory(data) 时，原始 data 对象被原地修改。
    evidence:
      file: weaponManager.js
      lines: "118-137"
      code_snippet: |
        validateInventory(inventory) {
          if (typeof inventory !== 'object' || ...) { return false; }
          if (!inventory.rifle || inventory.rifle < 1) {
            inventory.rifle = 1;  // ← 直接修改传入对象
          }
          for (const weaponId in inventory) {
            const count = inventory[weaponId];
            if (typeof count !== 'number' || ...) {
              inventory[weaponId] = Math.max(0, ...);  // ← 直接修改传入对象
            }
          }
          return true;
        }
    trigger_condition: "调用 validateInventory(data) 时，data.rifle 不存在或 data[x] 为
      负数/字符串，导致传入的 data 被静默修改，调用方看到已被变异的对象。"
    remediation: >
      将验证逻辑改为返回净化后的副本而非修改原始对象：
        validateInventory(inventory) {
          if (typeof inventory !== 'object' || ...) { return null; }
          const cleaned = { ...inventory };
          if (!cleaned.rifle || cleaned.rifle < 1) cleaned.rifle = 1;
          for (const id in cleaned) {
            const count = cleaned[id];
            if (typeof count !== 'number' || ...) {
              cleaned[id] = Math.max(0, Math.min(999999, Math.floor(count || 0)));
            }
          }
          return cleaned;
        }
      同时更新调用方 StorageAdapter.load()（line 104）接收返回值。

