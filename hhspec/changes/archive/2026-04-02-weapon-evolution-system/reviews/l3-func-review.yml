    root_cause: case_a_impl_bug
    impact: "配置错误可能导致运行时无限循环，但当前配置正确"
    remediation: |
      在 weaponManager.js 初始化时添加：
      ```javascript
      function validateEvolutionTree() {
        const visited = new Set();
        for (const id in weaponEvolutionConfig) {
          let current = id;
          const path = [];
          while (current && !visited.has(current)) {
            if (path.includes(current)) {
              throw new Error(`Evolution tree cycle detected: ${path.join(' -> ')} -> ${current}`);
            }
            path.push(current);
            current = weaponEvolutionConfig[current]?.nextTier;
          }
          path.forEach(p => visited.add(p));
        }
      }
      validateEvolutionTree();
      ```

