findings:
  - id: FND-CODE-001
    category: "Edge Case Handling"
    check_item: CODE-02
    severity: warning
    description: |
      weaponManager.js addWeapon() auto-equip logic (lines 192-214) iterates inventory to find highest tier weapon.
      If inventory contains only invalid weapon IDs (not in weaponEvolutionConfig), highestWeapon remains null
      and no weapon gets equipped. While unlikely in normal operation, this edge case is not explicitly handled.
    location: "weaponManager.js:192-214"
    evidence: |
      ```javascript
      for (const weaponId in this.inventory) {
        if (this.inventory[weaponId] > 0 && weaponEvolutionConfig[weaponId]) {
          const tier = weaponEvolutionConfig[weaponId].tier;
          if (tier > highestTier) {
            highestTier = tier;
            highestWeapon = weaponId;
          }
        }
      }
      if (highestWeapon) {
        this.equipWeapon(highestWeapon);
      }
      ```
      If highestWeapon is null (no valid weapons in inventory), equipWeapon is not called.
      Player would have no equipped weapon, but this is acceptable fallback behavior.
    recommendation: |
      Current behavior is acceptable (no weapon equipped if inventory corrupted).
      If stricter guarantee needed, add fallback: `if (!highestWeapon) { highestWeapon = 'rifle'; }`
    root_cause: case_a_impl_bug

  - id: FND-CODE-002
    category: "Code Readability"
    check_item: CODE-03
    severity: warning
    description: |
      weaponUI.js _renderEvolutionTreeCanvas() method is 78 lines (lines 409-486), exceeding recommended 50-line limit.
      Method handles multiple responsibilities: canvas setup, layout calculation, path rendering, node positioning,
      fusion line drawing, and state restoration. While logically cohesive, the length impacts readability.
    location: "weaponUI.js:409-486"
    evidence: |
      Method structure:
      - STEP-01: Clear canvas (2 lines)
      - STEP-02: Apply transformations (4 lines)
      - STEP-03: Layout parameters (7 lines)
      - Draw connection lines loop (11 lines)
      - STEP-04: Draw nodes and record positions (17 lines)
      - STEP-05: Render fusion convergence (13 lines)
      - STEP-06: Render fusion node (8 lines)
      - STEP-07: Restore state (2 lines)
      Total: 78 lines
    recommendation: |
      Consider extracting helper methods:
      - _layoutEvolutionTree(treeData) → returns nodePositions array
      - _drawEvolutionPaths(ctx, paths, layout)
      - _drawFusionConvergence(ctx, superNodes, fusionPos, canFuse)
      This would improve testability and readability. Not blocking for MVP.
    root_cause: case_a_impl_bug

  - id: FND-CODE-003
    category: "Resource Management"
    check_item: CODE-06
    severity: info
    description: |
      weaponUI.js _attachTreeInteractionListeners() (lines 599-641) creates event listeners on canvas element
      but does not provide cleanup mechanism. If renderEvolutionTree() is called multiple times (e.g., tab switching),
      new listeners are attached without removing old ones, causing listener accumulation.
    location: "weaponUI.js:599-641"
    evidence: |
      ```javascript
      _attachTreeInteractionListeners(canvas) {
        let hoverTimeout = null;
        canvas.addEventListener('mousemove', (e) => { ... });
        canvas.addEventListener('mouseleave', () => { ... });
        canvas.addEventListener('click', (e) => { ... });
      }
      ```
      No removeEventListener or cleanup. Each renderEvolutionTree() call adds new listeners.
    recommendation: |
      Store listener references and remove before re-attaching:
      ```javascript
      if (this._treeListeners) {
        canvas.removeEventListener('mousemove', this._treeListeners.mousemove);
        // ... remove others
      }
      this._treeListeners = { mousemove: (e) => {...}, ... };
      canvas.addEventListener('mousemove', this._treeListeners.mousemove);
      ```
      Or use { once: true } for single-use listeners. Current impact minimal (evolution tab not frequently re-rendered).
    root_cause: case_a_impl_bug

  - id: FND-CODE-004
    category: "Error Handling"
    check_item: CODE-05
    severity: info
    description: |
      weaponManager.js mergeWeapons() and fuseUltimateWeapon() catch all errors in transaction rollback (lines 261-265, 389-393)
      but log generic "Transaction failed" message without preserving original error details for debugging.
    location: "weaponManager.js:261-265, 389-393"
    evidence: |
      ```javascript
      } catch (error) {
        this.inventory = snapshot;
        console.error('[TXN-004] Transaction failed, rolled back:', error);
        return { success: false, error: 'TXN-004', message: '合成失败，已回滚' };
      }
      ```
      Error object logged to console but not included in return value. Caller cannot distinguish between
      save failure, validation failure, or other errors.
    recommendation: |
      Include error details in return value for better debugging:
      ```javascript
      return {
        success: false,
        error: 'TXN-004',
        message: '合成失败，已回滚',
        details: error.message
      };
      ```
      Not blocking as console.error provides debugging info and user message is appropriate.
    root_cause: case_a_impl_bug

  - id: FND-CODE-005
    category: "Code Duplication"
    check_item: CODE-07
    severity: info
    description: |
      weaponManager.js has duplicate transaction pattern in mergeWeapons() (lines 245-266) and fuseUltimateWeapon() (lines 371-394).
      Both methods follow identical pattern: snapshot → modify inventory → save → rollback on error.
    location: "weaponManager.js:245-266, 371-394"
    evidence: |
      mergeWeapons():
      ```javascript
      const snapshot = { ...this.inventory };
      try {
        this.inventory[weaponType] -= 3;
        this.inventory[config.nextTier] = (this.inventory[config.nextTier] || 0) + 1;
        const saveResult = this.saveInventory();
        if (!saveResult) throw new Error('Save failed');
        return { success: true, result: config.nextTier };
      } catch (error) {
        this.inventory = snapshot;
        console.error('[TXN-004] Transaction failed, rolled back:', error);
        return { success: false, error: 'TXN-004', message: '合成失败，已回滚' };
      }
      ```
      fuseUltimateWeapon() has nearly identical structure (different inventory operations).
    recommendation: |
      Extract transaction wrapper:
      ```javascript
      _executeTransaction(operation, errorMessage) {
        const snapshot = { ...this.inventory };
        try {
          operation();
          const saveResult = this.saveInventory();
          if (!saveResult) throw new Error('Save failed');
          return { success: true };
        } catch (error) {
          this.inventory = snapshot;
          console.error('[TXN-004] Transaction failed, rolled back:', error);
          return { success: false, error: 'TXN-004', message: errorMessage };
        }
      }
      ```
      Not blocking as duplication is limited to 2 occurrences and logic is clear.
    root_cause: case_a_impl_bug

