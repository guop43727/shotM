uncertainties:
  - uncertainty_id: UNC-001
    description: |
      weaponUI.js relies on global `player` object for equipped weapon status check (line 161).
      If `player` is undefined or `player.weapon` is null, the isEquipped check may fail.
      Current code has defensive checks (`typeof player !== 'undefined' && player.weapon`)
      but behavior when player.weapon.id is undefined is not explicitly tested.
    impact: "Low - defensive checks present, but edge case behavior unclear"
    mitigation: "Add unit test for player.weapon edge cases or add explicit null check"

  - uncertainty_id: UNC-002
    description: |
      weaponManager.js saveInventory() returns boolean (true/false) but StorageAdapter.save()
      returns object with { success, storage, warning?, error? }. The boolean conversion
      (line 415: `return result.success`) loses warning information (e.g., sessionStorage fallback).
      Unclear if callers need to know about storage fallback.
    impact: "Low - functionality correct, but warning info lost"
    mitigation: "Return full result object from saveInventory() if callers need storage type info"

