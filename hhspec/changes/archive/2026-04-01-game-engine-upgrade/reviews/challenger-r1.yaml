      description: |
        需求文档中的 coverage_checklist 未穷举到字段级别。虽然 6.2.2 节列出了受影响接口，
        但缺少对以下关键数据结构的字段级覆盖度清单：
        1. Phaser 游戏配置对象（type/width/height/physics/scene等字段）
        2. Phaser Scene 类的生命周期方法（preload/create/update字段）
