      recommendation: |
        在需求文档第 6.2 节增加 "6.2.4 字段级覆盖度清单" 子节，穷举以下配置对象的所有字段：

        **Phaser 游戏配置对象**：
        - type: Phaser.AUTO / Phaser.WEBGL / Phaser.CANVAS
        - width: 900
        - height: 700
        - parent: 'game-container'
        - physics: { default: 'arcade', arcade: { gravity: {y: 0}, debug: false } }
        - scene: [MainScene]
        - backgroundColor: '#000000'

        **Phaser Scene 生命周期方法**：
        - preload(): 资源预加载（音效文件、纹理）
        - create(): 场景初始化（创建游戏对象、配置物理引擎）
        - update(time, delta): 游戏循环更新（替代 requestAnimationFrame）

        **Arcade Physics 配置**：
        - gravity: {x: 0, y: 0}（无重力）
        - debug: false（生产环境关闭调试）
        - bounds: {x: 0, y: 0, width: 900, height: 700}（碰撞边界）

        **Sound Manager 配置**：
        - volume: 1.0（默认音量）
        - mute: false（默认不静音）
        - rate: 1.0（默认播放速率）
        - detune: 0（默认音调）

        **Vite 配置对象**：
        - base: './'（部署基础路径）
        - build.outDir: 'dist'（构建输出目录）
        - build.rollupOptions.input: 'src/main.js'（入口文件）
        - server.port: 5173（开发服务器端口）
        - server.open: true（自动打开浏览器）
