      优先级：需求文档 > 设计决策。但本案例 L0 Challenger W-02 警告在 L0 阶段已识别此问题，
      L2 DD-004 采纳了更合理的 UX 决策（弹窗期间移动无意义），且代码正确反映了设计意图。
      裁决：采用 Option A（更新 L0 文档对齐设计），不修改代码。
      依据：设计决策有合理性，L0 文档作为规范文档应及时反映已决策行为，
      不应让未更新的草稿文档成为阻塞正确实现的障碍。
    resolution: FND-FUNC-001 通过更新 L0 文档已解除 blocking

