uncertainties:
  - id: "UNC-001"
    description: >
      player.x 变为 NaN 的实际触发路径（BS-009）在当前代码中未找到明确的
      触发点。game.js 中所有对 player.x 的写操作均为数值运算（减法、加法、
      Math.max/Math.min），正常运行下不会产生 NaN。NaN 来源可能是未来外部
      代码（如武器系统、数字门系统修改 player.x），或历史遗留的未知路径。
      FND-CODE-001 的 blocking 判定基于：NaN 守卫位置错误这一事实本身构成
      逻辑缺陷，与实际触发概率无关——防御性代码若无法在所有路径上触达，
      其防御意义失效。

  - id: "UNC-002"
    description: >
      L1 需求文档 player-movement.md section 6.3 状态矩阵中，"波次间隔
      （waveActive=false，未暂停）"一行标注 player.x 可变，方向键有效。
      但 L2 设计（decision.md 决策 4）和实现（line 1075-1077）选择了禁止
      waveActive=false 时移动。此冲突由 L2 设计决策覆盖（Q-004 已决策），
      不属于代码层面缺陷，记录在此供 Coordinator 参考。

