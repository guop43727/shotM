findings:
  - id: FND-FUNC-001
    check_item: FUNC-07
    category: logic_correctness
    severity: blocking
    title: "代码 !game.waveActive 守卫与 L0 §6.3 状态矩阵冲突：波次间隔期间移动被错误阻止"
    description: |
      L0 需求文档 §6.3 状态矩阵明确规定：
        状态行"波次间隔（waveActive=false，未暂停）"
        -> player.x 可变 = 是
        -> ArrowLeft 有效 = 是
        -> ArrowRight 有效 = 是

      但 game.js:1075-1077 实现了：
        if (!game.waveActive) { return; }

      此代码在 game.waveActive = false（即波次间隔，gamePaused = false）时使整个 updatePlayerPosition()
      提前返回，导致玩家在波次间隔期间完全无法移动战士，与 L0 需求的显式规定直接冲突。

      此问题的来源可追溯为：L0 Challenger W-02 警告建议在弹窗期间禁止移动，L2 设计决策 DD-004
      采纳了此建议并实现 `!game.waveActive` 守卫。然而 L0 需求文档本身从未被正式修订，
      §6.3 状态矩阵仍保留"波次间隔可移动"的规定。L0 需求文档是功能判定的唯一权威来源。
    evidence:
      l0_requirement_location: "hhspec/changes/mobile-warrior-system/specs/requirements/PLAYER/player-movement.md §6.3 第2行 状态矩阵"
      code_location: "game.js:1075-1077"
      code_content: "if (!game.waveActive) { return; }"
      l0_state_matrix_row: "波次间隔（waveActive=false，未暂停） | player.x 可变=是 | ArrowLeft 有效=是 | ArrowRight 有效=是"
      design_doc_decision: "PLAYER-movement-design.md §1.3 DD-004：!game.waveActive 守卫（decision.md 决策 4）"
      challenger_warning: "challenger-r1.md W-02：建议弹窗期间禁止移动，但 L0 文档未同步更新"
    root_cause: case_b_design_gap
    root_cause_detail: |
      L2 设计阶段超越 L0 需求范围做出了 DD-004 决策（采纳 Challenger 建议），
      但未同步触发 L0 需求文档 §6.3 的修订。导致设计/代码与需求文档产生语义分歧。
      这是"需求-设计对齐缺口"（case_b_design_gap）。
    remediation: |
      必须选择以下二者之一修复：

      方案 A（修改 L0 需求，保留代码现状）：
        更新 player-movement.md §6.3 状态矩阵，将"波次间隔"行改为：
          player.x 可变 = 否，ArrowLeft 有效 = 否，ArrowRight 有效 = 否
        同时补充注释说明决策依据（BS-011 Q-004 已定：弹窗期间禁止移动）。
        更新 §5（边界场景清单）BS-011 状态从"待确认"改为"已定：弹窗期间禁止移动"。
        更新 BS-005 预期行为注释（取消暂停后恢复移动的前提是 waveActive=true）。

      方案 B（修改代码，与 L0 §6.3 保持一致）：
        删除 game.js:1075-1077 的 !game.waveActive 守卫（允许波次间隔期间移动）。
        若仍需禁止弹窗期间移动，需基于弹窗 DOM 可见性判断而非 waveActive 标志，
        或新增独立的 gameBlocked 状态变量（L0 §8 Q-004 备选方案）。

      建议采用方案 A，因 L2 设计决策 DD-004 有合理性（弹窗期间移动无意义），
      通过修订 L0 文档使两者对齐更为简洁。修订完成后须同步更新 Traceability Map。

  - id: FND-FUNC-002
    check_item: FUNC-08
    category: test_correspondence
    severity: warning
    title: "无 Test Engineer 测试执行报告可供交叉验证"
    description: |
