  - id: FND-FUNC-003
    check_item: FUNC-04
    category: traceability_l0
    severity: info
    title: "Traceability Map 行号引用存在微小偏差（不影响功能判定）"
    description: |
      Traceability Map（traceability-PLAYER.json）中 REQ-PLAYER-008 的 impl_location 行号
      声明为 game.js:1175（注：updatePlayerPosition() 先于 autoFire(time) 执行），
      但 Bullet 构造函数 this.x = player.x 的实际行号为 game.js:774，未在 Map 中独立记录。
      Map 对 REQ-PLAYER-008 的追溯说明依赖调用顺序推断而非直接代码行指向，
      虽逻辑正确但可追溯性略低于其他约束的记录精度。
    evidence:
      map_claim: "game.js:1175 — updatePlayerPosition() 先于 autoFire(time) 执行"
      actual_bullet_constructor: "game.js:774 — this.x = player.x"
    remediation: |
      建议在 Traceability Map 的 REQ-PLAYER-008 条目中补充：
        { "file": "game.js", "line": 774, "note": "Bullet 构造函数 this.x = player.x，读取更新后的 player.x" }
      仅为可追溯性改善，不影响功能判定。

