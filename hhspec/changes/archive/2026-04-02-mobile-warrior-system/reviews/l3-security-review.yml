    唯一持久化层为 localStorage（仅存储最高分 shotm_best_score）。
    攻击面极小：键盘事件输入、模块级全局变量直接可访问（浏览器控制台）。
    威胁主体：本地玩家通过浏览器控制台或 DevTools 操控 JS 全局状态（作弊行为），
    而非外部网络攻击者。

verdict: PASS

summary: |
  针对 mobile-warrior-system 变更新增代码（updatePlayerPosition()、keys 对象、
  keydown/keyup 监听，共约 40 行）完成 SEC-01 至 SEC-10 全量安全审查。

  无 blocking 级别安全发现，verdict = PASS。

  关键安全观察：
  - SEC-01 SQL 注入：不适用，无任何数据库或 SQL 操作。
  - SEC-02 XSS：createPauseOverlay() 的 innerHTML 赋值为全静态字符串，无用户可控内容；不构成 XSS 风险。
  - SEC-03 CSRF：不适用，无后端 HTTP 接口。
  - SEC-04 越权访问：不适用，无认证体系，无多用户资源隔离。
  - SEC-05 硬编码密钥：未发现任何密钥、token、连接串。
  - SEC-06 敏感数据暴露：新增代码无 console.log 输出，localStorage 仅存储整数高分分值，无敏感字段。
  - SEC-07 不安全反序列化：新增代码无任何 JSON.parse / eval / 反序列化调用。
  - SEC-08 依赖安全：本次变更未新增任何 npm 依赖，package.json 无变更。
  - SEC-09 认证/会话管理：不适用，无认证体系。
  - SEC-10 输入验证完整性：
      键盘事件使用严格字符串相等比较（=== 'ArrowLeft' / 'ArrowRight'），
      仅对 Boolean 标志位赋值，e.key 内容不被渲染或传入任何敏感路径。
      唯一来自键盘状态的数值路径（player.x 更新）包含 isNaN 防御和边界钳制，
      符合输入验证完整性要求。

  存在 2 条 warning 级别发现（非 blocking）：
  - FND-SEC-001: keys 对象为模块级 var-accessible 全局变量，可被浏览器控制台直接篡改（作弊向量），
    但这是浏览器单机游戏的固有架构特性，无法通过代码修改彻底阻止，评定为 warning。
  - FND-SEC-002: createPauseOverlay() 中 innerHTML 赋值为纯静态字符串，但作为安全最佳实践，
    可替换为 textContent + 样式节点方式，评定为 info。

findings:

  - id: FND-SEC-001
    category: SEC-10 输入验证完整性 / 状态篡改风险
    check_item: SEC-10
    severity: warning
    title: "keys 对象为模块级全局变量，可通过浏览器控制台直接篡改（作弊向量）"
    description: |
      game.js:112 声明 const keys = { ArrowLeft: false, ArrowRight: false }。
      在浏览器环境中，game.js 以 <script> 方式加载（非 ES Module 隔离），
      keys 对象在全局作用域可通过 DevTools 控制台直接访问和修改。

      同样，player.x 和 player.speed 也以相同方式暴露。

      攻击向量（作弊路径）：
        玩家打开浏览器 DevTools Console，执行以下操作：
        1. keys.ArrowRight = true; — 无需按键即可触发持续向右移动。
        2. player.speed = 9999; — 将移动速度提升至极大值，绕过边界钳制前的 NaN 防御。
           （注：边界钳制 Math.max/Math.min 仍会限制最终位置在 [150, 750]，
            此场景下最终影响有限。）
        3. player.x = 300; — 直接设置玩家位置到任意值（仍受下一帧钳制）。

      利用后影响：
        该变更本身（移动系统）影响有限：边界钳制保证 player.x 最终仍在合法范围内。
        但与已有的 player.weapon.damage 等字段合并考量时，
        整个 player 对象的所有属性均可通过控制台任意修改，属于全局性作弊面。

      攻击前提条件：
        - 攻击者能访问游戏页面的浏览器 DevTools（即玩家本人）。
        - 非网络层攻击，无法通过网络注入影响其他玩家（单机游戏）。

      严重度评估：
        攻击面=本地浏览器控制台（非网络外部攻击），影响范围=单机游戏自身状态（作弊）。
        不涉及数据泄露、认证绕过或远程代码执行。评定为 warning 而非 blocking。
    evidence:
      file: game.js
      lines: "99, 110-112"
      code_snippet: |
        // game.js:99
        speed: 5, // player 对象内，浏览器控制台可通过 player.speed 直接访问
        // game.js:112
        const keys = { ArrowLeft: false, ArrowRight: false };
      attack_vector: |
        浏览器 DevTools Console 执行 keys.ArrowLeft = true 可在不按键情况下
        触发持续左移逻辑；执行 player.speed = 999 可使战士单帧跳跃到钳制边界。
        这是浏览器 script-tag 加载模式下全局变量的固有特性，非本次变更引入的新漏洞，
        但本次变更扩大了可被直接篡改的状态范围（新增 keys.ArrowLeft/Right 两个标志位）。
    recommendation: |
      本条为 warning，不阻塞交付。对于单机浏览器游戏，此类作弊面属于行业内公认的接受风险，
      无实质伤害（无排行榜后端、无对其他玩家的影响）。
      若未来需要防作弊（如加入在线排行榜），建议：
      1. 将 game.js 迁移为 ES Module 格式（<script type="module">），利用模块作用域隔离全局变量。
      2. 关键游戏状态通过闭包封装，不在 window 级别暴露。
      3. 服务端验证分数合法性（需后端支持）。
      当前单机场景不需要立即修复。

  - id: FND-SEC-002
    category: SEC-02 XSS 防护 / 安全最佳实践
    check_item: SEC-02
    severity: info
    title: "createPauseOverlay() 使用 innerHTML 赋值静态字符串（无实际 XSS 风险）"
    description: |
      game.js:1053，createPauseOverlay() 函数中：
        overlay.innerHTML = '<div style="color:#8eff71;...">暂停 - 按ESC继续</div>';

      赋值内容为完全静态的字符串字面量，不包含任何来自用户输入、URL 参数、
      localStorage 读取或外部 API 的动态内容。当前实现不存在 XSS 漏洞。

      攻击向量：无。赋值字符串在代码编写时已完全确定，运行时无外部数据流入。

      列入 info 原因：innerHTML 的使用本身是一种需要评估的安全模式。
      虽然当前实现安全，但作为最佳实践，建议开发者在未来维护时注意：
      若此处的字符串改为拼接了外部数据（如 document.title、URL hash、
      游戏玩家名称等），则会立即产生 XSS 风险。
    evidence:
      file: game.js
      line: 1053
      code_snippet: |
        overlay.innerHTML = '<div style="color:#8eff71;font-size:48px;...">暂停 - 按ESC继续</div>';
      attack_vector: |
        当前无攻击向量。字符串为编译期静态字面量，无运行时用户数据流入。
        未来若字符串包含外部数据（URL params / player name 等）则会产生 XSS。
    recommendation: |
      本条为 info，无需立即修改。
      若希望遵循最小权限原则，可将 innerHTML 替换为更安全的 DOM 构造方式：
        const msgDiv = document.createElement('div');
        msgDiv.textContent = '暂停 - 按ESC继续';
        msgDiv.style.cssText = 'color:#8eff71;font-size:48px;...';
        overlay.appendChild(msgDiv);
      此修改非本次变更的安全要求，可在代码清理时统一处理。

