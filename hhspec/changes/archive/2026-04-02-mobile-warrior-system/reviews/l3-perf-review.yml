  - check_item: PERF-02
    description: "Unnecessary Loops / Recursion"
    result: |
      No loops or recursion in new code. updatePlayerPosition() is a flat
      sequential function: 5 early-return guards, 1 property read, 1 conditional
      branch (if/else if), and 1 Math.max/Math.min clamp. All O(1).
      The keys polling pattern (gameLoop reads keys.ArrowLeft/ArrowRight each
      frame) is the intentional design per DD-001; it is a pair of Boolean
      property accesses, not a loop.

  - check_item: PERF-03
    description: "Large Data Set Memory Loading"
    result: |
      No arrays or collections are loaded, created, or iterated in new code.
      keys object contains exactly 2 Boolean fields. player object is a
      pre-existing single object. No heap allocation occurs on the
      updatePlayerPosition() hot path.

  - check_item: PERF-05
    description: "Missing Index Hints"
    result: |
      Not applicable. This is a browser Canvas game with no database, no
      ORM, and no query engine. PERF-05 (index cross-validation against
      L2 IDX-NNN definitions) has no applicable scope.

  - check_item: PERF-06
    description: "Unnecessary Serialization / Deserialization"
    result: |
      No JSON parsing, JSON.stringify, or object-to-string-to-object
      conversions in new code. The movement value (player.x) is a plain
      Number that is read, arithmetically modified, and written back as a
      Number. No type coercion or serialization boundary is crossed.

  - check_item: PERF-07
    description: "Cache Miss"
    result: |
      No hot-path computations with repeated identical lookups that would
      benefit from caching. keys.ArrowLeft and keys.ArrowRight are the
      canonical source of truth (updated by event listeners) and must be
      read fresh each frame — caching them would be incorrect, not an
      optimization. GAME_CONSTANTS.ROAD_WIDTH is read from a module-scope
      object (single property lookup, O(1)).

