findings:
  - id: FND-PERF-001
    category: Repeated Constant Computation
    check_item: PERF-08
    severity: info
    location:
      file: game.js
      lines: "1086, 1103-1104"
    description: |
      canvas.width / 2 is computed twice within a single updatePlayerPosition()
      call: once on the NaN-reset path (line 1086) and once on the boundary
      calculation path (lines 1103-1104). canvas.width is a constant integer
      (900, set at game.js:3 and never changed), so both computations always
      yield 450. The boundary values leftBound and rightBound are also
      recomputed every frame regardless of whether any key is pressed — they
      are declared after the direction-check but before the final clamp, meaning
      the clamp is always executed (even when newX == player.x and no movement
      occurs).
    evidence: |
      game.js:3   - canvas.width = 900 (constant, never reassigned)
      game.js:1086 - player.x = canvas.width / 2  (NaN reset, yields 450)
      game.js:1103 - const leftBound  = canvas.width / 2 - GAME_CONSTANTS.ROAD_WIDTH  (yields 150)
      game.js:1104 - const rightBound = canvas.width / 2 + GAME_CONSTANTS.ROAD_WIDTH  (yields 750)
      game.js:1103-1105 are reached on every non-early-return frame, even when
      keys.ArrowLeft == false AND keys.ArrowRight == false, so newX == player.x
      and the Math.max/Math.min clamp is a no-op.
    impact: |
      At 60fps: 60 frames/sec x (2 divisions + 2 subtractions/additions +
      2 property reads) = 360 arithmetic operations/sec.
      Division on modern JS engines: ~0.0001ms each.
      Total overhead: ~0.036ms/sec across all frames combined.
      Effective per-frame cost: <<0.001ms.
      Impact on REQ-PLAYER-010 budget (1ms/frame): negligible (~0.001% of budget).
    data_scale_context: |
      Canvas dimensions are fixed integers (900x700). GAME_CONSTANTS is a
      module-scope frozen object. No dynamic scale or resize is implemented.
      The game targets 60fps on desktop browsers.
    recommendation: |
      No action required at current scale. For documentation purposes only:
      if future refactoring touches updatePlayerPosition(), the three constants
      could be hoisted to module scope alongside GAME_CONSTANTS to make the
      intent explicit:
        const PLAYER_LEFT_BOUND  = canvas.width / 2 - GAME_CONSTANTS.ROAD_WIDTH;  // 150
        const PLAYER_RIGHT_BOUND = canvas.width / 2 + GAME_CONSTANTS.ROAD_WIDTH;  // 750
      This also eliminates the duplicate canvas.width / 2 on the NaN reset path.
      This is purely a readability/consistency improvement, not a performance fix.

  - id: FND-PERF-002
    category: Event Listener Lifetime Management
    check_item: PERF-04
    severity: info
    location:
      file: game.js
      lines: "1031-1047"
    description: |
      Two document-level event listeners (keydown for ArrowLeft/ArrowRight,
      keyup for ArrowLeft/ArrowRight) are registered at module load time with
      no corresponding removeEventListener. Within the current game architecture
      (single HTML page, single game instance, page reload to restart), this is
      correct and expected behavior — the listeners are intentionally permanent
      for the page lifetime.

      The concern is latent: if a future feature adds a game restart mechanism
      that re-executes the module initialization code (e.g., dynamic script
      reload or a reinit() function), duplicate listeners would be registered,
      causing double-processing of every keydown/keyup event per listener
      accumulation cycle. The guard logic inside updatePlayerPosition() would
      still produce correct movement values (Boolean assignment is idempotent),
      so correctness would not be broken, but CPU cost per event would grow
      linearly with reinit count.
    evidence: |
      game.js:1031-1038: document.addEventListener('keydown', ...) — no cleanup ref stored
      game.js:1040-1047: document.addEventListener('keyup', ...)  — no cleanup ref stored
      No removeEventListener calls anywhere in game.js for these handlers.
      No game reinit mechanism exists in current codebase (confirmed by Grep).
      keydown/keyup handlers perform only Boolean assignments (lines 1033, 1036,
      1042, 1045) — idempotent under duplicate firing.
    impact: |
      Current impact: zero. Single page lifetime = single listener registration.
      Hypothetical impact if game reinit added without cleanup:
        N reinits x 2 listeners per reinit = 2N keydown/keyup handlers active.
        Each keydown event: 2N Boolean assignments instead of 2.
        At 10 reinits: 20 assignments per keydown (still <<0.01ms per event).
        Correctness preserved (idempotent Boolean sets).
      No memory leak risk under current architecture. Modern browser GC does
      not collect document-attached listeners until the document is unloaded.
    data_scale_context: |
      Single-page static game. No server, no navigation, no module hot reload.
      Page reload is the only way to restart (current architecture).
      Event rate: keydown/keyup at human input frequency (<<10 events/sec typical).
    recommendation: |
      No action required for current architecture. For future maintainability,
      if a game reinit or cleanup function is ever added, store listener
      references and remove them before re-registering:
        const onKeyDown = (e) => { ... };
        const onKeyUp   = (e) => { ... };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup',   onKeyUp);
        // In cleanup: document.removeEventListener('keydown', onKeyDown);
      This is a defensive pattern recommendation, not a bug fix.

