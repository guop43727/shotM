          keys 和 player 对象在 window 全局作用域中可直接访问。
          注：index.html 中存在一个 <script type="module"> 标签引用 /src/main.js，
          但 game.js 本身并非通过 module 标签加载，全局变量暴露风险有效。
        prerequisites: |
          - 攻击者可访问游戏所在页面的浏览器 DevTools（即玩家本人）
          - 非网络层攻击，无法通过网络通道影响其他玩家
          - 单机游戏，无排行榜后端验证
        impact: |
          影响范围：单机游戏自身状态（作弊）。
          不涉及数据泄露、认证绕过或远程代码执行。
