      recommendation: |
        本条为 SUGGEST，无需立即修改。若希望遵循最小权限原则，可替换为更安全的 DOM 构造方式：
          const msgDiv = document.createElement('div');
          msgDiv.textContent = '暂停 - 按ESC继续';
