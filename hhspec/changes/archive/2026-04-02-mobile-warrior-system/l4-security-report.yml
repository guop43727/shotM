        本次变更（键盘移动控制）新增了 keys.ArrowLeft 和 keys.ArrowRight 两个可篡改标志位，
        但这属于浏览器单机游戏的固有架构特性，非严重安全漏洞。
      recommendation: |
        本条为 SUGGEST，不阻塞交付。当前单机场景接受风险，无需立即修复。
        若未来引入在线排行榜等需要防作弊的功能，建议：
        1. 将 game.js 迁移为 ES Module 格式（<script type="module">），利用模块作用域隔离全局变量。
        2. 关键游戏状态通过闭包封装，不在 window 级别暴露。
        3. 服务端验证分数合法性（需后端支持）。
      rollback_level: "N/A — 非阻塞，不需要回退"
      cwe_id: "CWE-602 (Client-Side Enforcement of Server-Side Security)"

