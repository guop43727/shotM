        source: "game.js:112, index.html (script tag analysis)"
        location: "game.js line 112"
        content: "const keys = { ArrowLeft: false, ArrowRight: false };"
        index_html_context: |
          index.html line 160: <script type="module" src="/src/main.js"></script>
          index.html line 161: <script> ... inline defender slot logic ...</script>
          game.js は index.html から直接 module タグで読み込まれていないため全局変量が露出する。
          （game.js の script タグは別途存在するか、または vite 開発サーバー経由で読み込まれる）
      counterpart:
        source: "hhspec/changes/mobile-warrior-system/reviews/l3-security-review.yml"
        location: "findings FND-SEC-001"
        quote: "keys 对象为模块级 var-accessible 全局变量，可被浏览器控制台直接篡改（作弊向量）"
      description: |
        本条发现与 L3 安全审查 FND-SEC-001（warning 级别）一致。
