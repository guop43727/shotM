      severity: "SUGGEST"
      title: "keys 对象为模块级全局变量，可通过浏览器 DevTools 控制台直接篡改（作弊向量）"
      owasp_category: "A01 访问控制（客户端游戏状态完整性）"
      source_finding: "FND-SEC-001（L3 Security Review，warning 级别）"
      attack_vector:
        description: |
          玩家在本地浏览器打开 DevTools Console，直接执行：
            keys.ArrowRight = true;   // 无需按键触发持续右移
            player.speed = 9999;      // 将移动速度设为极大值
