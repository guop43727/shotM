shared_contracts:
  naming_conventions:
    - pattern: "keys.{KeyName}"
      description: "键盘状态对象字段命名，使用原生 KeyboardEvent.key 字符串作为字段名"
      examples:
        - "keys.ArrowLeft"
        - "keys.ArrowRight"

    - pattern: "player.{property}"
      description: "player 对象属性扩展，新增字段与已有字段风格一致（camelCase）"
      examples:
        - "player.speed"
        - "player.x"

    - pattern: "update{Entity}()"
      description: "逐帧状态更新函数命名规范（参考现有 autoFire, drawPlayer）"
      examples:
        - "updatePlayerPosition()"

  type_mappings:
    - name: "player.x"
      type: Number
      range: "[150, 750]"
      note: "canvas.width/2 ± GAME_CONSTANTS.ROAD_WIDTH"

    - name: "player.speed"
      type: Number
      value: 5
      unit: "px/frame"

    - name: "keys.ArrowLeft"
      type: Boolean
      initial: false

    - name: "keys.ArrowRight"
      type: Boolean
      initial: false

  boundary_constants:
    left_boundary: 150
    right_boundary: 750
    derivation: "canvas.width/2 - GAME_CONSTANTS.ROAD_WIDTH = 450 - 300 = 150"
    source: "game.js:3, game.js:9"
